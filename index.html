<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系主理人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Hiragino Sans", "Meiryo", sans-serif;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .message-en {
            font-size: 1.5rem;
            color: #2d3748;
            margin-bottom: 1rem;
            line-height: 1.6;
        }
        .message-ja {
            font-size: 1.25rem;
            color: #4a5568;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="message-en">Please contact the manager for the appropriate subdomain</p>
        <p class="message-ja">適切なサブドメインについては管理者にお問い合わせください</p>
    </div>
</body>
</html>
